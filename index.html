<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Nova AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Markdown Parser (marked) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify for security -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <!-- Highlight.js for Code Formatting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet" href="style.css">

    <style>
        .msg-container { content-visibility: auto; contain-intrinsic-size: 100px; }
        .glass-panel { 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); 
            will-change: backdrop-filter; 
            background-color: rgba(30, 31, 32, 0.75); 
        }
    </style>

    <link rel="icon" type="image/png" href="Nova.png">
</head>

<body class="text-gray-200 bg-[#131314] flex">

    <!-- Toast Container -->
    <div id="toast-container"
        class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Auth Overlay -->
    <div id="auth-overlay"
        class="fixed inset-0 z-[9999] bg-[#131314] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="text-center mb-8 transform transition-transform duration-700 hover:scale-[1.01]">
            <div class="w-24 h-24 mx-auto mb-6 avatar-glow-wrapper">
                <div class="avatar-glow-inner">
                    <svg class="text-white w-12 h-12" viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z"
                            fill="currentColor" />
                    </svg>
                </div>
            </div>
            <h1 class="text-5xl font-semibold text-white mb-3 tracking-wide">Nova <span class="gradient-text">AI</span>
            </h1>
            <p class="text-gray-400 font-medium mb-6">Sign in to sync your personas and chats.</p>

            <div class="flex flex-col gap-3 w-full max-w-xs mx-auto">
                <input type="email" id="auth-email" placeholder="Email address"
                    class="w-full bg-[#1e1f20] border border-[#333537] rounded-xl px-4 py-3 text-gray-200 focus:outline-none focus:border-blue-500 transition-all">
                <input type="password" id="auth-password" placeholder="Password"
                    class="w-full bg-[#1e1f20] border border-[#333537] rounded-xl px-4 py-3 text-gray-200 focus:outline-none focus:border-blue-500 transition-all mb-2">

                <div class="flex items-center justify-start w-full px-1 mb-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="remember-me-checkbox"
                            class="w-4 h-4 rounded border-[#333537] bg-[#131314] text-blue-600 focus:ring-blue-500/50 focus:ring-offset-0 transition-all cursor-pointer accent-blue-600"
                            checked>
                        <span class="text-sm text-gray-400 group-hover:text-gray-200 transition-colors">Remember
                            me</span>
                    </label>
                </div>

                <button id="email-signin-btn"
                    class="w-full bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-500 transition-colors shadow-[0_0_20px_rgba(59,130,246,0.2)]">
                    Sign In
                </button>

                <button id="email-signup-btn"
                    class="w-full bg-transparent text-gray-400 border border-[#333537] px-6 py-3 rounded-xl font-bold hover:text-white hover:bg-[#333537] transition-colors">
                    Create Account
                </button>
                <p id="auth-error-msg" class="text-red-400 text-sm mt-2 hidden"></p>
            </div>
        </div>
    </div>

    <div id="sidebar-backdrop"></div>
    <!-- Sidebar -->
    <aside id="sidebar"
        class="w-72 glass-panel flex-col transition-all duration-300 flex h-full border-r border-[#333537]/50 relative z-20 shrink-0">
        <div class="px-4 pb-4 pt-4">
            <button id="new-chat-btn"
                class="w-full flex items-center gap-3 bg-[#131314] hover:bg-[#1e1f20] text-gray-200 px-4 py-3 rounded-xl transition-all duration-300 border border-blue-500/30 hover:border-blue-400/60 shadow-[0_0_10px_rgba(59,130,246,0.05)] hover:shadow-[0_0_15px_rgba(59,130,246,0.15)]">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="text-blue-400 shrink-0">
                    <path d="M5 12h14" />
                    <path d="M12 5v14" />
                </svg>
                <span class="font-medium text-sm tracking-wide">New chat</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 mt-4 pb-20 relative" id="history-container">
            <div class="flex justify-between items-center mb-3 px-2">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Recent</p>
                <button id="clear-history-btn"
                    class="text-xs font-medium text-red-400 hover:text-red-300 transition-colors"
                    title="Clear History">Clear</button>
            </div>
            <div class="space-y-0.5 relative" id="history-list">
                <!-- History populated via JS -->
            </div>
        </div>

        <div class="p-4 mt-auto space-y-2 bg-[#1e1f20] relative z-10 border-t border-[#333537]/50">
            <button
                class="w-full flex items-center gap-3 hover:bg-[#2d2f31] p-2.5 rounded-xl transition-colors duration-200 text-sm font-medium text-gray-200 group">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"
                    class="text-gray-400 group-hover:text-gray-200 transition-colors">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 16v-4" />
                    <path d="M12 8h.01" />
                </svg>
                Help
            </button>
            <button id="settings-btn"
                class="w-full flex items-center gap-3 hover:bg-[#2d2f31] p-2.5 rounded-xl transition-colors duration-200 text-sm font-medium text-gray-200 group">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"
                    class="text-gray-400 group-hover:text-gray-200 transition-colors">
                    <path
                        d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                Settings
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative w-full overflow-hidden min-w-0">
        <header
            class="flex justify-between items-center p-4 shrink-0 z-30 relative sticky top-0 glass-panel border-b border-transparent sm:border-[#333537]/50 transition-colors">

            <div id="header-chat-title"
                class="absolute left-1/2 transform -translate-x-1/2 text-[15px] font-medium text-gray-300 truncate w-[45%] text-center pointer-events-none hidden sm:block">
            </div>

            <div class="flex items-center gap-3 relative z-10">
                <button class="hover:bg-[#333537] p-2 rounded-full transition-colors" id="header-menu-btn"
                    title="Toggle Sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
                        <line x1="4" x2="20" y1="12" y2="12" />
                        <line x1="4" x2="20" y1="6" y2="6" />
                        <line x1="4" x2="20" y1="18" y2="18" />
                    </svg>
                </button>

                <div class="relative" id="persona-dropdown-container">
                    <div class="text-xl font-medium text-gray-300 flex items-center gap-2 cursor-pointer hover:bg-[#282a2c] px-3 py-1.5 rounded-lg transition-colors select-none"
                        id="header-persona-toggle">
                        <span id="header-persona-title"
                            class="truncate max-w-[120px] inline-block align-bottom">Nova</span>
                        <span class="text-xs font-semibold bg-[#333537] text-gray-300 px-2 py-0.5 rounded-full"
                            id="header-model-display">Writing</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="text-gray-500 transition-transform duration-200" id="header-persona-chevron">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>

                    <div id="persona-dropdown-menu"
                        class="hidden absolute top-full left-0 mt-2 w-64 bg-[#282a2c] border border-[#333537] rounded-xl shadow-2xl z-50 py-1 flex-col overflow-hidden">
                        <div
                            class="px-4 py-2 text-[10px] font-semibold text-gray-500 uppercase tracking-wider border-b border-[#333537] mb-1">
                            Select Persona</div>
                        <div id="persona-list" class="max-h-60 overflow-y-auto">
                        </div>
                        <div class="border-t border-[#333537] mt-1 pt-1">
                            <button id="add-persona-btn"
                                class="w-full text-left px-4 py-2.5 text-sm text-blue-400 hover:bg-[#333537] transition-colors flex items-center gap-2 font-medium">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                Create New Persona
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2 pr-2">

                <div class="relative" id="current-chat-options-container">
                    <button class="hover:bg-[#333537] p-2 rounded-full transition-colors hidden"
                        id="current-chat-menu-btn" title="Chat Options">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
                            <circle cx="12" cy="12" r="1"></circle>
                            <circle cx="12" cy="5" r="1"></circle>
                            <circle cx="12" cy="19" r="1"></circle>
                        </svg>
                    </button>

                    <div id="current-chat-dropdown"
                        class="hidden absolute top-full right-0 mt-2 w-48 bg-[#282a2c] border border-[#333537] rounded-xl shadow-2xl z-50 py-1 flex flex-col">
                        <button id="header-rename-chat-btn"
                            class="w-full text-left px-4 py-2.5 text-sm text-gray-200 hover:bg-[#333537] hover:text-white transition-colors flex items-center gap-3">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
                                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                            </svg>
                            Rename
                        </button>
                        <button id="header-delete-chat-btn"
                            class="w-full text-left px-4 py-2.5 text-sm text-red-400 hover:bg-[#333537] hover:text-red-300 transition-colors flex items-center gap-3">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path
                                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                </path>
                            </svg>
                            Delete
                        </button>
                    </div>
                </div>

                <div class="w-9 h-9 shrink-0 user-glow-wrapper transition-transform hover:scale-105 cursor-pointer"
                    id="user-profile-btn" title="Profile Settings">
                    <div class="user-glow-inner text-white text-sm font-semibold" id="user-profile-header-display">
                        <span id="user-profile-initial">U</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Chat Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto w-full pb-40 scroll-smooth">
            <div class="max-w-4xl mx-auto w-full px-4 md:px-8 py-6 flex flex-col gap-8" id="chat-inner">

                <!-- Empty State -->
                <div class="mb-8 transform transition-all duration-1000 translate-y-0 opacity-100" id="empty-state">
                    <h1 class="text-5xl font-semibold mb-2 tracking-tight">
                        <span class="gradient-text animate-gradient-x bg-[length:200%_200%]">Hello, <span
                                id="greeting-name">User</span></span>
                    </h1>
                    <h2 class="text-5xl font-semibold tracking-tight mb-8">
                        <span class="bg-clip-text text-transparent bg-gradient-to-r from-gray-400 to-[#444749] animate-pulse">How can I help you today?</span>
                    </h2>

                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 max-w-3xl">
                        <button
                            class="suggestion-chip p-4 rounded-xl border border-[#333537]/50 bg-[#1e1f20]/50 hover:bg-[#282a2c] hover:border-[#444749] transition-all text-left flex flex-col gap-2 group">
                            <span class="text-xl group-hover:scale-110 transition-transform origin-left">💡</span>
                            <span class="text-sm font-medium text-gray-300 group-hover:text-white">Brainstorm
                                ideas</span>
                        </button>
                        <button
                            class="suggestion-chip p-4 rounded-xl border border-[#333537]/50 bg-[#1e1f20]/50 hover:bg-[#282a2c] hover:border-[#444749] transition-all text-left flex flex-col gap-2 group">
                            <span class="text-xl group-hover:scale-110 transition-transform origin-left">💻</span>
                            <span class="text-sm font-medium text-gray-300 group-hover:text-white">Help me code</span>
                        </button>
                        <button
                            class="suggestion-chip p-4 rounded-xl border border-[#333537]/50 bg-[#1e1f20]/50 hover:bg-[#282a2c] hover:border-[#444749] transition-all text-left flex flex-col gap-2 group">
                            <span class="text-xl group-hover:scale-110 transition-transform origin-left">📝</span>
                            <span class="text-sm font-medium text-gray-300 group-hover:text-white">Write an email</span>
                        </button>
                        <button
                            class="suggestion-chip p-4 rounded-xl border border-[#333537]/50 bg-[#1e1f20]/50 hover:bg-[#282a2c] hover:border-[#444749] transition-all text-left flex flex-col gap-2 group">
                            <span class="text-xl group-hover:scale-110 transition-transform origin-left">🔍</span>
                            <span class="text-sm font-medium text-gray-300 group-hover:text-white">Summarize text</span>
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <div id="input-wrapper" class="w-full flex justify-center p-4 sticky bottom-0 z-30 glass-panel border-t border-[#333537]/50 md:border-t-0 md:bg-transparent md:backdrop-filter-none md:will-change-auto bg-gradient-to-t from-[#131314] via-[#131314]/90 to-transparent">
            <div class="w-full max-w-2xl">

                <div class="max-w-4xl mx-auto w-full relative pointer-events-auto">

                    <!-- Floating Scroll to Bottom Button -->
                    <button id="scroll-to-bottom-btn"
                        class="absolute -top-14 left-1/2 transform -translate-x-1/2 bg-[#282a2c] hover:bg-[#333537] border border-[#444749] rounded-full p-2.5 shadow-lg text-gray-300 transition-all duration-300 translate-y-20 opacity-0 z-40 hidden flex items-center justify-center cursor-pointer">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <polyline points="19 12 12 19 5 12"></polyline>
                        </svg>
                    </button>

                    <div id="edit-mode-banner"
                        class="hidden absolute -top-10 left-4 right-4 bg-[#282a2c] border border-[#333537] border-b-0 rounded-t-xl px-4 py-2 justify-between items-center text-sm z-0 shadow-sm transition-all pb-4 translate-y-2">
                        <span class="text-blue-400 flex items-center gap-2 font-medium">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                            </svg>
                            Editing Message...
                        </span>
                        <button id="cancel-edit-btn"
                            class="text-gray-400 hover:text-white transition-colors">Cancel</button>
                    </div>

                    <div
                        class="relative z-10 bg-[#1e1f20] rounded-3xl p-2 flex flex-col transition-all border border-[#333537]/50 focus-within:border-[#444749] focus-within:bg-[#282a2c] focus-within:shadow-md">

                        <!-- Multiple Image Preview Container -->
                        <div id="image-preview-container" class="hidden border-b border-[#333537]/50">
                            <div id="image-preview-list" class="flex gap-4 overflow-x-auto p-4 pb-2">
                                <!-- Previews injected here -->
                            </div>
                        </div>

                        <input type="file" id="chat-image-input" class="hidden" accept="image/*" multiple>
                        <input type="file" id="chat-file-input" class="hidden"
                            accept=".txt,.md,.json,.js,.py,.html,.css,.csv,.xml,.env,.log" multiple> <textarea
                            id="chat-input" rows="1"
                            class="w-full bg-transparent resize-none outline-none px-4 py-3 max-h-48 text-[15px] text-gray-200 overflow-y-auto placeholder-gray-500 focus:ring-0 transition-shadow rounded-xl"
                            placeholder="Type a message..."></textarea>

                        <div class="flex justify-between items-center px-2 pb-1">
                            <div class="flex gap-1 text-gray-400">
                                <button id="upload-image-btn"
                                    class="p-2 hover:bg-[#333537] rounded-full transition-colors"
                                    title="Upload image(s)">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                                        <circle cx="9" cy="9" r="2" />
                                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                                    </svg>
                                </button>
                                <button id="upload-file-btn"
                                    class="p-2 hover:bg-[#333537] rounded-full transition-colors"
                                    title="Attach file (Code, TXT, JSON)">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path
                                            d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                                    </svg>
                                </button>
                            </div>

                            <button id="send-btn"
                                class="p-2 bg-[#333537] text-gray-500 rounded-full transition-all duration-200 cursor-not-allowed flex items-center justify-center w-10 h-10"
                                disabled>
                                <svg id="icon-send" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="translate-x-0.5">
                                    <path d="m22 2-7 20-4-9-9-4Z" />
                                    <path d="M22 2 11 13" />
                                </svg>
                                <svg id="icon-stop" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
                                    class="hidden">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- Create/Edit Persona Modal -->
    <div id="create-persona-modal"
        class="fixed inset-0 modal-backdrop z-[60] flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-[#1e1f20] border border-[#333537] rounded-2xl shadow-2xl w-full max-w-[500px] p-6 transform scale-95 transition-transform duration-200"
            id="create-persona-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-medium text-gray-200" id="persona-modal-title">Create New Persona</h3>
                <button id="close-create-persona-btn"
                    class="text-gray-400 hover:text-gray-200 transition-colors p-1 rounded-full hover:bg-[#333537]">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <input type="hidden" id="edit-persona-id" value="">

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Character/Persona Name</label>
                    <input type="text" id="new-persona-name"
                        class="w-full bg-[#131314] border border-[#333537] rounded-lg px-4 py-2.5 text-gray-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                        placeholder="e.g. Sukuna">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">System Prompt (Personality &
                        Rules)</label>
                    <textarea id="new-persona-prompt" rows="8"
                        class="w-full bg-[#131314] border border-[#333537] rounded-lg px-4 py-2.5 text-[14px] text-gray-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all resize-none placeholder-gray-600"
                        placeholder="[Character: Name]\n[Personality: ...]\n[Instructions: ...]"></textarea>
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3">
                <button id="cancel-create-persona-btn"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:bg-[#333537] transition-colors">Cancel</button>
                <button id="save-new-persona-btn"
                    class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-500 text-white transition-colors">Save
                    Persona</button>
            </div>
        </div>
    </div>

    <!-- General Settings Modal -->
    <div id="settings-modal"
        class="fixed inset-0 modal-backdrop z-[999] flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-[#1e1f20] border border-[#333537] rounded-2xl shadow-2xl w-full max-w-[500px] p-6 transform scale-95 transition-transform duration-200"
            id="settings-modal-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-medium text-gray-200">Settings</h3>
                <button id="close-settings-btn"
                    class="text-gray-400 hover:text-gray-200 transition-colors p-1 rounded-full hover:bg-[#333537]">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="flex border-b border-[#333537] mb-5">
                <button id="tab-api"
                    class="px-4 py-2 text-sm font-medium text-blue-400 border-b-2 border-blue-400 transition-colors">API
                    Keys</button>
                <button id="tab-prompt"
                    class="px-4 py-2 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 transition-colors">Current
                    Personality</button>
            </div>

            <div id="api-settings-view" class="space-y-4 block">
                <!-- API Key input removed as per requirements (using auto-rotating backend pool) -->

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1.5">Text Model (Default)</label>
                        <input type="text" id="api-text-model-input" value="x-ai/grok-4-fast"
                            class="w-full bg-[#131314] border border-[#333537] rounded-lg px-4 py-2.5 text-gray-200 focus:outline-none focus:border-blue-500 transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1.5">Vision Model (Images)</label>
                        <input type="text" id="api-vision-model-input" value="x-ai/grok-4-fast"
                            class="w-full bg-[#131314] border border-[#333537] rounded-lg px-4 py-2.5 text-gray-200 focus:outline-none focus:border-blue-500 transition-all text-sm">
                    </div>
                </div>
            </div>

            <div id="prompt-settings-view" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">System Prompt for <span
                            id="settings-persona-name-label" class="text-gray-200 font-semibold">Nova</span></label>
                    <textarea id="system-prompt-input" rows="6"
                        class="w-full bg-[#131314] border border-[#333537] rounded-lg px-4 py-2.5 text-[14px] text-gray-200 focus:outline-none focus:border-blue-500 transition-all resize-none placeholder-gray-600"
                        placeholder="Define personality here..."></textarea>
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3">
                <button id="cancel-settings-btn"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:bg-[#333537] transition-colors">Cancel</button>
                <button id="save-settings-btn"
                    class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-500 text-white transition-colors">Save
                    Settings</button>
            </div>
        </div>
    </div>

    <!-- Profile Settings Modal -->
    <div id="profile-modal"
        class="fixed inset-0 modal-backdrop z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-[#1e1f20] border border-[#333537] rounded-2xl shadow-2xl w-full max-w-sm p-6 transform scale-95 transition-transform duration-200"
            id="profile-modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-medium text-gray-200">Profile</h3>
                <button id="close-profile-btn"
                    class="text-gray-400 hover:text-gray-200 transition-colors p-1 rounded-full hover:bg-[#333537]">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="flex flex-col items-center mb-6">
                <div id="profile-avatar-preview"
                    class="w-20 h-20 rounded-full bg-[#131314] border-2 border-[#4285f4] flex items-center justify-center text-3xl font-semibold text-white mb-3 bg-cover bg-center overflow-hidden shadow-inner relative z-10">
                    <span id="profile-avatar-preview-text">U</span>
                </div>

                <div class="flex gap-4 items-center">
                    <label
                        class="cursor-pointer text-sm font-medium text-blue-400 hover:text-blue-300 transition-colors">
                        Change Picture
                        <input type="file" id="profile-image-input" class="hidden" accept="image/*">
                    </label>
                    <button id="remove-profile-pic-btn"
                        class="text-sm font-medium text-gray-500 hover:text-red-400 transition-colors hidden">Remove</button>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Display Name</label>
                    <input type="text" id="profile-name-input" value="User"
                        class="w-full bg-[#131314] border border-[#333537] rounded-lg px-4 py-2.5 text-gray-200 focus:outline-none focus:border-blue-500 transition-all">
                </div>
            </div>

            <div class="mt-8 flex justify-between items-center w-full">
                <button id="logout-btn"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-white bg-red-500 hover:shadow-[0_0_15px_rgba(239,68,68,0.5)] transition-all duration-300">Sign
                    Out</button>
                <div class="flex gap-3">
                    <button id="cancel-profile-btn"
                        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:bg-[#333537] transition-colors">Cancel</button>
                    <button id="save-profile-btn"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-500 text-white transition-colors">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Dialog Modals -->
    <div id="confirm-modal"
        class="fixed inset-0 modal-backdrop z-[999] flex items-center justify-center hidden opacity-0 transition-opacity duration-200 p-4">
        <div class="bg-[#1e1f20] border border-[#333537] rounded-2xl shadow-2xl w-full max-w-[400px] p-6 transform scale-95 transition-transform duration-200"
            id="confirm-modal-content">
            <h3 class="text-xl font-medium text-gray-200 mb-2" id="confirm-title">Are you sure?</h3>
            <p class="text-gray-400 text-sm mb-6" id="confirm-message">This action cannot be undone.</p>
            <div class="flex justify-end gap-3">
                <button id="cancel-confirm-btn"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:bg-[#333537] transition-colors">Cancel</button>
                <button id="action-confirm-btn"
                    class="px-4 py-2 rounded-lg text-sm font-medium bg-red-600 hover:bg-red-500 text-white transition-colors">Confirm</button>
            </div>
        </div>
    </div>

    <div id="rename-modal"
        class="fixed inset-0 modal-backdrop z-[999] flex items-center justify-center hidden opacity-0 transition-opacity duration-200 p-4">
        <div class="bg-[#1e1f20] border border-[#333537] rounded-2xl shadow-2xl w-full max-w-[400px] p-6 transform scale-95 transition-transform duration-200"
            id="rename-modal-content">
            <h3 class="text-xl font-medium text-gray-200 mb-4">Rename Chat</h3>
            <input type="text" id="rename-chat-input"
                class="w-full bg-[#131314] border border-[#333537] rounded-lg px-4 py-2.5 text-gray-200 focus:outline-none focus:border-blue-500 transition-all mb-6"
                placeholder="Enter new chat name...">
            <div class="flex justify-end gap-3">
                <button id="cancel-rename-btn"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:bg-[#333537] transition-colors">Cancel</button>
                <button id="save-rename-btn"
                    class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-500 text-white transition-colors">Save</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/app.js?v=2.2"></script>

</body>

</html>
